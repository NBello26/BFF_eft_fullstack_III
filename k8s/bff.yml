apiVersion: apps/v1
kind: Deployment
metadata:
  name: bff-deployment
  labels:
    app: ms-bff
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ms-bff
  template:
    metadata:
      labels:
        app: ms-bff
    spec:
      containers:
      - name: ms-bff
        image: 782424855823.dkr.ecr.us-east-1.amazonaws.com/ms-bff:${IMAGE_TAG}
        ports:
        - containerPort: 8087
        env:
        # Apuntamos a Eureka
        - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
          value: "http://eureka-service:8761/eureka/"
        # Reemplazamos localhost por los DNS internos de K8s de cada microservicio
        - name: SERVICES_MASCOTAS_URL
          value: "http://mascotas-service:8081"
        - name: SERVICES_GEOLOCALIZACION_URL
          value: "http://geolocalizacion-service:8083"
        - name: SERVICES_COINCIDENCIAS_URL
          value: "http://coincidencias-service:8084"
        - name: SERVICES_USUARIOS_URL
          value: "http://usuarios-service:8085"
        - name: SERVICES_NOTIFICACIONES_URL
          value: "http://notificaciones-service:8086"
---
apiVersion: v1
kind: Service
metadata:
  name: bff-service
spec:
  type: ClusterIP
  selector:
    app: ms-bff
  ports:
    - protocol: TCP
      port: 8087
      targetPort: 8087