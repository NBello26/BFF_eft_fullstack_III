name: CI/CD MS BFF

on:
  push:
    branches: [ "main" ]

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login en Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
        id: login-ecr

      - name: Build and Push a ECR
        run: |
          docker build -t ${{ secrets.ECR_REPO_URL_BFF }}:latest .
          docker push ${{ secrets.ECR_REPO_URL_BFF }}:latest

      - name: Desplegar MS BFF vía SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids ${{ secrets.EC2_BFF_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters '{
              "commands":[
                "set -e",
                "aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}",
                "docker pull ${{ secrets.ECR_REPO_URL_BFF }}:latest",
                "docker stop ms-bff || true",
                "docker rm ms-bff || true",
                "TOKEN=$(curl -s -X PUT \"http://169.254.169.254/latest/api/token\" -H \"X-aws-ec2-metadata-token-ttl-seconds: 21600\")",
                "export EC2_IP=$(curl -s -H \"X-aws-ec2-metadata-token: $TOKEN\" http://169.254.169.254/latest/meta-data/local-ipv4)",
                "docker run -d --name ms-bff -p 8087:8087 -e JAVA_OPTS=\"-Xmx250m\" --memory=\"350m\" -e ALLOWED_CORS_ORIGIN=\"http://${{ secrets.FRONTEND_PUBLIC_IP }}\" -e EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=\"${{ secrets.EUREKA_URL }}\" -e EUREKA_INSTANCE_PREFER_IP_ADDRESS=\"true\" -e EUREKA_INSTANCE_IP_ADDRESS=\"$EC2_IP\" -e SERVICES_MASCOTAS_URL=\"http://MS-MASCOTA\" -e SERVICES_GEOLOCALIZACION_URL=\"http://MS-GEOLOCALIZACION\" -e SERVICES_COINCIDENCIAS_URL=\"http://MS-COINCIDENCIAS\" -e SERVICES_USUARIOS_URL=\"http://MS-USUARIOS\" -e SERVICES_NOTIFICACIONES_URL=\"http://MS-NOTIFICACIONES\" ${{ secrets.ECR_REPO_URL_BFF }}:latest"
              ]
            }' \
            --query "Command.CommandId" \
            --output text)
            
          echo "Comando enviado: $COMMAND_ID. Esperando ejecución..."
            
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id ${{ secrets.EC2_BFF_INSTANCE_ID }}
            
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id ${{ secrets.EC2_BFF_INSTANCE_ID }} \
            --query "StandardOutputContent" \
            --output text